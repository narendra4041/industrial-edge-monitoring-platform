name: Backend CI

on:
  pull_request:
    branches:
      - develop
      - main
    paths:
      - "backend/**"
      - "infrastructure/docker-compose/**"
      - ".github/workflows/backend-ci.yml"

  push:
    branches:
      - feature/**
      - develop
      - main
    paths:
      - "backend/**"
      - "infrastructure/docker-compose/**"
      - ".github/workflows/backend-ci.yml"

jobs:
  backend-tests:
    name: Backend Tests and Quality Checks
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run Ruff linting
        run: ruff check .

      - name: Run Ruff formatting check
        run: ruff format --check .

      - name: Run tests
        run: pytest -q

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build backend Docker image
        run: docker build -t industrial-edge-backend:ci backend